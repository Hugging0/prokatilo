services:
  postgres:
    ports:
      - "127.0.0.1:5433:5432"

  backend:
    environment:
      ENVIRONMENT: development
      API_ROOT_PATH: "/api"
      CREATE_TABLES_ON_STARTUP: "false"
      CORS_ORIGINS: "http://localhost:8080,http://127.0.0.1:8080,http://localhost:3000,http://127.0.0.1:3000"
      YOOKASSA_RETURN_URL: "http://localhost:8080"
      ADMIN_EMAILS: "admin@prokatilo.local"
    ports:
      - "127.0.0.1:8000:8000"

  frontend:
    build:
      args:
        NEXT_PUBLIC_API_URL: "/api"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: "/api"
    ports:
      - "127.0.0.1:3000:3000"

  caddy:
    command:
      [
        "caddy",
        "run",
        "--config",
        "/etc/caddy/Caddyfile.local",
        "--adapter",
        "caddyfile",
      ]
    ports: !override
      - "127.0.0.1:8080:8080"
    volumes: !override
      - ./deploy:/etc/caddy:ro
