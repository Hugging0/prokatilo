services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-prokatilo}"
      POSTGRES_USER: "${POSTGRES_USER:-prokatilo}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-change-me-local-postgres-password}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-prokatilo} -d ${POSTGRES_DB:-prokatilo}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    command:
      [
        "uvicorn",
        "app.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--proxy-headers",
        "--forwarded-allow-ips",
        "*",
        "--root-path",
        "/api",
      ]
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER:-prokatilo}:${POSTGRES_PASSWORD:-change-me-local-postgres-password}@postgres:5432/${POSTGRES_DB:-prokatilo}"
      ENVIRONMENT: production
      API_ROOT_PATH: "/api"
      CREATE_TABLES_ON_STARTUP: "false"
      CORS_ORIGINS: "${CORS_ORIGINS:-http://localhost,http://localhost:3000,http://127.0.0.1,http://127.0.0.1:3000,http://193.233.246.61,http://193.233.246.61:3000,https://myprokatilo.ru,https://www.myprokatilo.ru}"
      YOOKASSA_RETURN_URL: "${YOOKASSA_RETURN_URL:-https://myprokatilo.ru}"
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL:-/api}"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL:-/api}"
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    environment:
      APP_DOMAIN: "${APP_DOMAIN:-myprokatilo.ru}"
      ACME_EMAIL: "${ACME_EMAIL:-admin@myprokatilo.ru}"
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy:/etc/caddy:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
